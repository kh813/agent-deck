name: "publish"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            zip_name: "agent-ui-mac.zip"
          - platform: "windows-latest"
            args: ""
            zip_name: "agent-ui-win.zip"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install

      - name: setup python
        if: matrix.platform == 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: run python test suite
        if: matrix.platform == 'macos-latest'
        run: |
          python3 -m venv .ci-test-venv
          .ci-test-venv/bin/pip install -q --upgrade pip
          .ci-test-venv/bin/pip install -q pytest
          .ci-test-venv/bin/pytest python/tests/ -v

      - name: build tauri app
        run: npm run tauri build -- ${{ matrix.args }}

      - name: re-sign macOS app (fixes broken resource seal)
        if: matrix.platform == 'macos-latest'
        # Confirmed for v0.0.8: Tauri's own ad-hoc signature gets sealed
        # before Contents/Resources is fully finalized, so `codesign
        # --verify` fails with "code has no resources but signature
        # indicates they must be present" — macOS then refuses to launch
        # the app at all ("is damaged and can't be opened"), independent of
        # quarantine/Gatekeeper settings. A fresh ad-hoc re-sign over the
        # complete, final bundle fixes this (verified empirically).
        run: |
          codesign --force --deep --sign - src-tauri/target/aarch64-apple-darwin/release/bundle/macos/agent-ui.app
          codesign --verify --deep --strict src-tauri/target/aarch64-apple-darwin/release/bundle/macos/agent-ui.app

      - name: package macOS app to zip
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          ditto -c -k --sequesterRsrc --keepParent agent-ui.app ${{ github.workspace }}/agent-ui-mac.zip
          cd ${{ github.workspace }}
          zip -r agent-ui-mac.zip python config agent_config.json preflight.sh

      - name: package Windows exe to zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path src-tauri/target/release/agent-ui.exe,python,config,agent_config.json,preflight.bat -DestinationPath agent-ui-win.zip

      # A broken release asset (truncated build, a bad zip step, an
      # accidentally-empty binary) has shipped silently before with no error
      # anywhere in the pipeline — users only found out later as "is damaged
      # and can't be opened" (macOS) or a silent crash (Windows), long after
      # the asset was already public. codesign --verify (above) catches a
      # bad macOS *signature*, but not a corrupted *zip*; this step re-opens
      # the actual artifact that's about to be uploaded and checks the
      # embedded binary is present and a sane size, on both platforms.
      - name: verify release zip integrity
        if: matrix.platform == 'macos-latest'
        run: |
          set -e
          SIZE=$(unzip -p agent-ui-mac.zip agent-ui.app/Contents/MacOS/agent-ui | wc -c)
          echo "agent-ui.app/Contents/MacOS/agent-ui: ${SIZE} bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "::error::agent-ui binary inside agent-ui-mac.zip is suspiciously small (${SIZE} bytes) — refusing to publish a likely-corrupted release."
            exit 1
          fi

      - name: verify release zip integrity
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("agent-ui-win.zip")
          $entry = $zip.Entries | Where-Object { $_.FullName -eq "agent-ui.exe" }
          $zip.Dispose()
          if (-not $entry) {
            Write-Error "agent-ui.exe entry not found in agent-ui-win.zip — refusing to publish a likely-corrupted release."
            exit 1
          }
          Write-Host "agent-ui.exe: $($entry.Length) bytes"
          if ($entry.Length -lt 1000000) {
            Write-Error "agent-ui.exe inside agent-ui-win.zip is suspiciously small ($($entry.Length) bytes) — refusing to publish a likely-corrupted release."
            exit 1
          }

      - name: upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.zip_name }}
          draft: false
          name: "agent-ui ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
